name: Weekly deep quality

on:
  schedule:
    # Monday 06:00 UTC — deep checks PRs skip (full e2e, unused, audits, security).
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-deep-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deep-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Strict unused (frontend + backend)
        run: pip install -r backend/requirements-dev.txt && npm run check:unused:strict
      - name: npm audit (root + frontend, high+)
        continue-on-error: true
        run: |
          npm audit --audit-level=high
          npm audit --audit-level=high --prefix frontend
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Frontend unit tests with coverage
        working-directory: frontend
        run: npm test -- --coverage
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend E2E (full)
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e

  deep-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install --prefer-binary -r requirements.txt -r requirements-dev.txt
      - name: pip-audit (backend)
        continue-on-error: true
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on -f markdown -o pip-audit-report.md
          cat pip-audit-report.md
      - name: Backend pytest
        working-directory: backend
        run: python -m pytest -q

  deep-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Security posture
        run: npm run verify:security-posture
      - name: Electron unit tests
        run: npm run test:electron

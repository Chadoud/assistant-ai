name: Build Installers

# Desktop CI tiers:
#   PR  → L0/L1 quality (path-filtered) + optional packaging smoke
#   v* / workflow_dispatch → full Win + Mac installers + publish
on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.set.outputs.frontend }}
      backend: ${{ steps.set.outputs.backend }}
      electron: ${{ steps.set.outputs.electron }}
      cloud: ${{ steps.set.outputs.cloud }}
      packaging: ${{ steps.set.outputs.packaging }}
      sort_queue: ${{ steps.set.outputs.sort_queue }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'sync/**'
            electron:
              - 'electron/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/validate-electron*.cjs'
              - 'scripts/verify-main-register-handlers.cjs'
            cloud:
              - 'cloud-node/**'
            packaging:
              - 'electron/**'
              - 'scripts/package-*.js'
              - 'scripts/package-*.cjs'
              - 'scripts/lib/updater-packaging.cjs'
              - 'scripts/lib/mac-packaging.cjs'
              - 'scripts/verify-packaged-*.cjs'
              - 'scripts/prepare-release-resources.sh'
              - 'package.json'
              - '.github/workflows/build.yml'
            sort_queue:
              - 'infra/llm/sort-queue/**'
      - name: Resolve change flags
        id: set
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "electron=true" >> "$GITHUB_OUTPUT"
            echo "cloud=true" >> "$GITHUB_OUTPUT"
            echo "packaging=true" >> "$GITHUB_OUTPUT"
            echo "sort_queue=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "electron=${{ steps.filter.outputs.electron }}" >> "$GITHUB_OUTPUT"
            echo "cloud=${{ steps.filter.outputs.cloud }}" >> "$GITHUB_OUTPUT"
            echo "packaging=${{ steps.filter.outputs.packaging }}" >> "$GITHUB_OUTPUT"
            echo "sort_queue=${{ steps.filter.outputs.sort_queue }}" >> "$GITHUB_OUTPUT"
          fi

  quality-contract:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Validate Electron IPC manifest
        run: node scripts/validate-electron-ipc-manifest.cjs
      - name: Validate electron.d.ts preload parity
        run: node scripts/validate-electron-dts.cjs
      - name: Secret logging audit
        run: node scripts/audit-secret-logging.cjs
      - name: Tracked env secret audit
        run: bash scripts/audit-env-secrets-in-repo.sh

  quality-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm install
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Locale key parity
        working-directory: frontend
        run: npm run check-locale-keys
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Frontend unit tests
        working-directory: frontend
        run: npm test
      - name: Install Playwright browsers
        if: github.event_name == 'pull_request'
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend E2E smoke (Playwright)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e:smoke
      - name: Install Playwright browsers (full)
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend E2E (full)
        if: github.event_name != 'pull_request'
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:e2e

  quality-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install --prefer-binary -r requirements.txt -r requirements-dev.txt
      - name: Backend pytest (voice + job_service coverage)
        working-directory: backend
        run: python -m pytest -q --cov=voice --cov=job_service --cov=health_checks --cov-fail-under=25 --cov-report=term
      - name: Sync crypto tests
        run: python -m pytest sync/tests -q
      - name: Classification eval (no Ollama)
        working-directory: backend
        run: OLLAMA_EVAL=0 python -m classify_eval.run_eval
        shell: bash
      - name: KPI guardrails (fixture)
        working-directory: backend
        run: python -m classify_eval.kpi_guardrails --sort-plan classify_eval/fixtures/baseline_sort_plan.csv --max-uncertain-rate 0.60 --max-error-rate 0.10 --max-p90-ms 5000

  quality-electron:
    needs: changes
    if: needs.changes.outputs.electron == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Electron integration + main-process command tests
        run: npm run test:electron

  quality-cloud:
    needs: changes
    if: needs.changes.outputs.cloud == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloud-node/package-lock.json
      - name: Cloud-node unit tests
        working-directory: cloud-node
        run: npm install && npm test

  quality-sort-queue:
    needs: changes
    if: needs.changes.outputs.sort_queue == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/llm/sort-queue/package-lock.json
      - name: Sort-queue unit tests
        working-directory: infra/llm/sort-queue
        run: npm install && npm test

  quality:
    needs:
      [
        changes,
        quality-contract,
        quality-frontend,
        quality-backend,
        quality-electron,
        quality-cloud,
        quality-sort-queue,
      ]
    if: |
      always() &&
      !cancelled() &&
      needs.quality-contract.result == 'success' &&
      (needs.quality-frontend.result == 'success' || needs.quality-frontend.result == 'skipped') &&
      (needs.quality-backend.result == 'success' || needs.quality-backend.result == 'skipped') &&
      (needs.quality-electron.result == 'success' || needs.quality-electron.result == 'skipped') &&
      (needs.quality-cloud.result == 'success' || needs.quality-cloud.result == 'skipped') &&
      (needs.quality-sort-queue.result == 'success' || needs.quality-sort-queue.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required quality gates passed (skipped path-filtered jobs are OK)"

  # Thin Mac package + asar verify — PRs that touch packaging paths only (not every PR).
  package-smoke-mac:
    needs: [changes, quality]
    if: |
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Skip (no packaging path changes)
        if: needs.changes.outputs.packaging != 'true'
        run: echo "Packaging paths unchanged — smoke skipped"

      - uses: actions/checkout@v4
        if: needs.changes.outputs.packaging == 'true'

      - name: Set up Node.js
        if: needs.changes.outputs.packaging == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        if: needs.changes.outputs.packaging == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps + build frontend
        if: needs.changes.outputs.packaging == 'true'
        run: |
          npm install
          npm install --prefix frontend
          npm run build:frontend

      - name: Build native backend + package Mac (no notarize)
        if: needs.changes.outputs.packaging == 'true'
        env:
          EXO_MAC_UNIVERSAL: "0"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pip install --prefer-binary -r backend/requirements.txt pyinstaller
          (cd backend && python -m PyInstaller backend.spec)
          mkdir -p electron/resources
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            cp backend/dist/backend electron/resources/backend-arm64
          else
            cp backend/dist/backend electron/resources/backend-x64
          fi
          bash scripts/prepare-release-resources.sh
          npm run package:mac
          node scripts/verify-packaged-app.cjs
          node scripts/verify-packaged-preload.cjs

  # ── Full installers: v* tags + workflow_dispatch only (not every PR) ────────
  build-windows:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm install

      - name: Install frontend Node dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        # VITE_SENTRY_DSN is baked in at build time; absent on PRs/forks so those
        # builds simply ship without Sentry (backend crash-ingest still applies).
        # Privacy/Terms URLs are public pages baked into every distributable so
        # the in-app legal links always resolve (first-run acceptance step).
        run: npm run build:frontend
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PRIVACY_POLICY_URL: https://exosites.ch/eng/app-privacy
          VITE_TERMS_OF_SERVICE_URL: https://exosites.ch/eng/app-terms

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --prefer-binary -r requirements.txt pyinstaller

      - name: Build backend binary (Windows)
        working-directory: backend
        run: python -m PyInstaller backend.spec

      - name: Move backend.exe to resources
        run: |
          New-Item -ItemType Directory -Force -Path electron/resources
          Copy-Item backend/dist/backend.exe electron/resources/backend.exe

      - name: Bundle release resources (integration config + optional Gmail OAuth)
        shell: bash
        run: bash scripts/prepare-release-resources.sh
        env:
          GMAIL_OAUTH_CLIENT_JSON_B64: ${{ secrets.GMAIL_OAUTH_CLIENT_JSON_B64 }}
          EXOSITES_DROPBOX_APP_KEY: ${{ secrets.EXOSITES_DROPBOX_APP_KEY }}
          EXOSITES_MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.EXOSITES_MICROSOFT_OAUTH_CLIENT_ID }}
          EXOSITES_NOTION_CLIENT_ID: ${{ secrets.EXOSITES_NOTION_CLIENT_ID }}
          EXOSITES_NOTION_CLIENT_SECRET: ${{ secrets.EXOSITES_NOTION_CLIENT_SECRET }}
          EXOSITES_INFOMANIAK_CLIENT_ID: ${{ secrets.EXOSITES_INFOMANIAK_CLIENT_ID }}
          EXOSITES_INFOMANIAK_CLIENT_SECRET: ${{ secrets.EXOSITES_INFOMANIAK_CLIENT_SECRET }}
          EXOSITES_SLACK_CLIENT_ID: ${{ secrets.EXOSITES_SLACK_CLIENT_ID }}
          EXOSITES_SLACK_CLIENT_SECRET: ${{ secrets.EXOSITES_SLACK_CLIENT_SECRET }}
          STRICT_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}

      - name: Package app
        # Note: WIN_CSC_* are not consumed by the manual packager yet — see docs/PRODUCTION_RELEASE.md.
        run: npm run package:win

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows installer
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: EXO-Windows
          retention-days: 7
          path: |
            dist-installer/Exo Setup.exe
            dist-installer/latest.yml
            dist-installer/*.blockmap
          if-no-files-found: warn

  # ── macOS backend (Intel) — paired with arm64 slice in universal .dmg ─────────
  build-macos-backend-x64:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --prefer-binary -r requirements.txt pyinstaller

      - name: Build backend binary (x86_64 native)
        working-directory: backend
        run: |
          python -m PyInstaller backend.spec
          file dist/backend
          if ! file dist/backend | grep -q x86_64; then
            echo "::error::Intel runner did not produce x86_64 backend"
            exit 1
          fi

      - name: Smoke-test x86_64 backend (/health)
        run: bash scripts/verify-mac-backend-health.sh backend/dist/backend
        env:
          VERIFY_BACKEND_HEALTH_TIMEOUT_SEC: "180"

      - uses: actions/upload-artifact@v4
        with:
          name: backend-macos-x64
          path: backend/dist/backend
          retention-days: 3

  # ── macOS installer (.dmg) ───────────────────────────────────────────────
  build-macos:
    needs: [quality, build-macos-backend-x64]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 75
    # GitHub forbids `secrets.*` in step `if:` — mirror signing secrets into env first.
    env:
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta (needed for universal2 binary compilation)
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root Node dependencies
        run: npm install

      - name: Install frontend Node dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        # VITE_SENTRY_DSN is baked in at build time; absent on PRs/forks so those
        # builds simply ship without Sentry (backend crash-ingest still applies).
        # Privacy/Terms URLs are public pages baked into every distributable so
        # the in-app legal links always resolve (first-run acceptance step).
        run: npm run build:frontend
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PRIVACY_POLICY_URL: https://exosites.ch/eng/app-privacy
          VITE_TERMS_OF_SERVICE_URL: https://exosites.ch/eng/app-terms

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --prefer-binary -r requirements.txt pyinstaller

      - name: Download x86_64 backend (Intel runner)
        uses: actions/download-artifact@v4
        with:
          name: backend-macos-x64
          path: /tmp/backend-x64

      - name: Build backend binaries (macOS — separate arch slices, no lipo)
        working-directory: backend
        # PyInstaller one-file bundles embed arch-specific Python — lipo produces a
        # broken "universal" Mach-O (x86_64 bootloader extracts arm64 Python). Ship
        # backend-x64 and backend-arm64 side by side; Electron picks at runtime.
        run: |
          set -e
          test -f /tmp/backend-x64/backend || (echo "::error::Intel backend artifact missing" && exit 1)
          rm -rf build dist
          PYINSTALLER_TARGET_ARCH=arm64 python -m PyInstaller backend.spec
          cp dist/backend /tmp/backend_arm64
          file /tmp/backend_arm64
          file /tmp/backend-x64/backend
          if ! file /tmp/backend-x64/backend | grep -q x86_64; then
            echo "::error::Intel backend artifact is not x86_64"
            exit 1
          fi
          if ! file /tmp/backend_arm64 | grep -q arm64; then
            echo "::error::Apple Silicon backend build is not arm64"
            exit 1
          fi

      - name: Smoke-test arm64 backend (/health)
        run: bash scripts/verify-mac-backend-health.sh /tmp/backend_arm64
        env:
          VERIFY_BACKEND_HEALTH_TIMEOUT_SEC: "180"

      - name: Stage macOS backend slices for packaging
        run: |
          mkdir -p electron/resources
          cp /tmp/backend-x64/backend electron/resources/backend-x64
          cp /tmp/backend_arm64 electron/resources/backend-arm64
          chmod +x electron/resources/backend-x64 electron/resources/backend-arm64
          EXO_MAC_UNIVERSAL=1 node scripts/stage-mac-backend-slices.cjs
          file electron/resources/backend-x64
          file electron/resources/backend-arm64

      - name: Generate macOS app icon (.icns)
        run: node scripts/generate-mac-icns.js

      - name: Generate DMG background
        run: node scripts/generate-dmg-background.js

      - name: Bundle release resources (integration config + optional Gmail OAuth)
        run: bash scripts/prepare-release-resources.sh
        env:
          GMAIL_OAUTH_CLIENT_JSON_B64: ${{ secrets.GMAIL_OAUTH_CLIENT_JSON_B64 }}
          EXOSITES_DROPBOX_APP_KEY: ${{ secrets.EXOSITES_DROPBOX_APP_KEY }}
          EXOSITES_MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.EXOSITES_MICROSOFT_OAUTH_CLIENT_ID }}
          EXOSITES_NOTION_CLIENT_ID: ${{ secrets.EXOSITES_NOTION_CLIENT_ID }}
          EXOSITES_NOTION_CLIENT_SECRET: ${{ secrets.EXOSITES_NOTION_CLIENT_SECRET }}
          EXOSITES_INFOMANIAK_CLIENT_ID: ${{ secrets.EXOSITES_INFOMANIAK_CLIENT_ID }}
          EXOSITES_INFOMANIAK_CLIENT_SECRET: ${{ secrets.EXOSITES_INFOMANIAK_CLIENT_SECRET }}
          EXOSITES_SLACK_CLIENT_ID: ${{ secrets.EXOSITES_SLACK_CLIENT_ID }}
          EXOSITES_SLACK_CLIENT_SECRET: ${{ secrets.EXOSITES_SLACK_CLIENT_SECRET }}
          STRICT_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}

      # Signing/notarization vars are exported to the environment ONLY on release
      # runs where MAC_CSC_LINK is present. Passing CSC_LINK="" inline makes
      # electron-builder treat the empty string as a certificate path and abort
      # with "not a file", so unsigned PR/fork builds must not define it at all.
      #
      # Import the .p12 first, then point electron-builder at the keychain via
      # CSC_KEYCHAIN + CSC_NAME. Exporting CSC_LINK makes electron-builder
      # re-import into a second keychain and often hangs waiting for a keychain
      # password prompt that never appears on CI.

      - name: Import codesign certificate to keychain
        if: env.MAC_CSC_LINK != ''
        env:
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: actions
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          echo "CSC_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$MAC_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/signing.p12"
          security import "$RUNNER_TEMP/signing.p12" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "Signing identities in release keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Configure macOS signing (release only)
        if: env.MAC_CSC_LINK != ''
        run: |
          CSC_NAME="${MAC_SIGN_IDENTITY#Developer ID Application: }"
          {
            echo "CSC_NAME=${CSC_NAME}"
            echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Codesign PyInstaller backend (signed releases)
        if: env.MAC_CSC_LINK != '' && env.MAC_SIGN_IDENTITY != ''
        run: |
          for bin in electron/resources/backend-x64 electron/resources/backend-arm64; do
            codesign --force --options runtime --timestamp \
              --entitlements electron/entitlements.mac.plist \
              --sign "$MAC_SIGN_IDENTITY" "$bin"
            codesign --verify --strict --verbose=2 "$bin"
          done

      - name: Package universal app (.dmg)
        # Developer ID signing + notarization run only when the signing step above
        # exported credentials (release runs). When absent, auto-discovery is
        # disabled so unsigned builds on PRs/forks still succeed. The notarize
        # afterSign hook is a no-op unless the APPLE_* credentials are present.
        # `zip` is built alongside `dmg` so electron-updater gets its feed
        # artifacts (the .zip + latest-mac.yml that checkForUpdatesAndNotify reads).
        run: |
          npx electron-builder --config electron-builder.mac.cjs --mac dmg zip --universal --publish never
          node -e "require('./scripts/lib/mac-packaging.cjs').copyPrimaryDmgAlias(require('path').join(process.cwd(),'dist-installer'))"
        env:
          EXO_MAC_UNIVERSAL: "1"
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.MAC_CSC_LINK != '' && 'true' || 'false' }}

      - name: Verify packaged app (preload, integration config, exo://)
        run: node scripts/verify-packaged-app.cjs
        env:
          EXO_MAC_UNIVERSAL: "1"
          EXO_MAC_VERIFY_SLICE_ARCH: "1"
          STRICT_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}

      - name: Verify universal backend slices (Intel + Apple Silicon)
        run: |
          if [[ -f dist-installer/Exo.dmg ]]; then
            EXO_MAC_UNIVERSAL=1 bash scripts/verify-mac-backend-slices-from-dmg.sh dist-installer/Exo.dmg
          else
            APP="$(node -p "require('./scripts/find-packaged-mac-app.cjs').findPackagedMacApp(process.cwd())")"
            if [[ -n "$APP" && -d "$APP" ]]; then
              EXO_MAC_UNIVERSAL=1 EXO_MAC_VERIFY_SLICE_ARCH=1 node scripts/verify-packaged-app.cjs "$APP"
            else
              echo "::error::No Exo.dmg or Exo.app found under dist-installer/"
              ls -la dist-installer/ || true
              exit 1
            fi
          fi

      - name: Upload macOS installer
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: EXO-macOS
          retention-days: 7
          path: |
            dist-installer/Exo.dmg
            dist-installer/*.zip
            dist-installer/latest-mac.yml
            dist-installer/*.blockmap
          if-no-files-found: warn

  # ── Release version contract (tags only) ────────────────────────────────────
  validate-release-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Assert tag matches package / appVersion / CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/validate-release-version.mjs --version "$VERSION"

  # ── Production cloud auth (tags only) ───────────────────────────────────────
  verify-cloud-auth:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install

      - name: Verify api.exosites.ch auth + GO SYNC relay
        run: npm run verify:cloud-auth

      - name: Verify legal URLs (store blocker)
        run: npm run verify:legal-urls

      - name: Security posture regression gate
        run: npm run verify:security-posture

  # ── GitHub Release (tags v* only) — candidate / prerelease ─────────────────
  publish-release:
    needs: [build-windows, build-macos, verify-cloud-auth, validate-release-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (CHANGELOG for release notes)
        uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: EXO-Windows
          path: release-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: EXO-macOS
          path: release-assets

      - name: Extract changelog section for this tag
        # Pulls the `## [x.y.z]` block matching the tag out of CHANGELOG.md so the
        # release body is the curated changelog (generated notes are appended).
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No CHANGELOG.md section found for ${VERSION}._" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: release-notes.md
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish STAGING update feed (tags v* only) ────────────────────────────
  # Candidates go to exo-assistant-staging/. Production feed is NOT updated here.
  # Promote to prod: Phase 2 workflow (promote-desktop-feed) — see
  # docs/runbooks/desktop-update-pipeline-checklist.md
  # Web SSH secrets match exosites-agency (NOT api.exosites.ch Node host).
  publish-staging:
    needs: [build-windows, build-macos, verify-cloud-auth, validate-release-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (CHANGELOG for release notes)
        uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: EXO-Windows
          path: site-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: EXO-macOS
          path: site-assets

      - name: Re-check version + latest-mac.yml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          YML=$(find site-assets -name 'latest-mac.yml' | head -n 1)
          if [ -n "$YML" ]; then
            node scripts/validate-release-version.mjs --version "$VERSION" --latest-mac-yml "$YML"
          else
            node scripts/validate-release-version.mjs --version "$VERSION"
            echo "::warning::latest-mac.yml not in artifacts — skipped yml version bind"
          fi

      - name: Flatten artifacts + write + sign staging latest.json
        env:
          UPDATE_FEED_PRIVATE_KEY_HEX: ${{ secrets.UPDATE_FEED_PRIVATE_KEY_HEX }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://exosites.ch/downloads/exo-assistant-staging"
          mkdir -p publish
          find site-assets -type f -exec cp -f {} publish/ \;
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md | node scripts/format-changelog-notes.cjs)
          cat > publish/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": $NOTES,
            "mac": "$BASE/Exo.dmg",
            "windows": "$BASE/Exo%20Setup.exe"
          }
          EOF
          if [ -z "${UPDATE_FEED_PRIVATE_KEY_HEX:-}" ]; then
            echo "::error::UPDATE_FEED_PRIVATE_KEY_HEX secret is required to sign latest.json"
            exit 1
          fi
          node tools/update-feed-keygen/sign-latest.cjs publish/latest.json
          echo "Staging publish:" && ls -1 publish && echo "---" && cat publish/latest.json

      - name: Upload to staging over SSH (fail closed)
        env:
          EXOSITES_DEPLOY_SSH_HOST: ${{ secrets.EXOSITES_DEPLOY_SSH_HOST }}
          EXOSITES_DEPLOY_SSH_USER: ${{ secrets.EXOSITES_DEPLOY_SSH_USER }}
          EXOSITES_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.EXOSITES_DEPLOY_SSH_PRIVATE_KEY }}
          EXOSITES_DOWNLOADS_STAGING_PATH: ${{ secrets.EXOSITES_DOWNLOADS_STAGING_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${EXOSITES_DEPLOY_SSH_HOST:-}" ] || [ -z "${EXOSITES_DEPLOY_SSH_USER:-}" ]; then
            echo "::error::EXOSITES_DEPLOY_SSH_HOST and EXOSITES_DEPLOY_SSH_USER are required"
            exit 1
          fi
          if [ -z "${EXOSITES_DOWNLOADS_STAGING_PATH:-}" ]; then
            echo "::error::EXOSITES_DOWNLOADS_STAGING_PATH is required (e.g. ./sites/exosites.ch/downloads/exo-assistant-staging)"
            exit 1
          fi
          if [ -z "${EXOSITES_DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::EXOSITES_DEPLOY_SSH_PRIVATE_KEY is required (password/sshpass fallback removed)"
            exit 1
          fi
          sudo apt-get update && sudo apt-get install -y rsync openssh-client
          DEST="${EXOSITES_DEPLOY_SSH_USER}@${EXOSITES_DEPLOY_SSH_HOST}:${EXOSITES_DOWNLOADS_STAGING_PATH}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/exosites_downloads_deploy"
          printf '%s\n' "$EXOSITES_DEPLOY_SSH_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "Rsync staging → ${DEST}/"
          rsync -avz -e "ssh -i $KEY_FILE -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            publish/ "$DEST/"

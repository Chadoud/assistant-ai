global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics

  - job_name: sort_queue
    static_configs:
      - targets: ["sort-queue:4011"]
    metrics_path: /metrics

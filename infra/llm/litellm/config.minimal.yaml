model_list:
  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://ollama:11434
      timeout: 180
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
      timeout: 60
  - model_name: moondream
    litellm_params:
      model: ollama/moondream:latest
      api_base: http://ollama:11434
      timeout: 180

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 180

router_settings:
  num_retries: 2
  timeout: 180

name: exosites_mobile
description: Exo second brain — mobile capture + GO SYNC client
publish_to: none
version: 0.2.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  crypto: ^3.0.6
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  mobile_scanner: ^6.0.2
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: ../electron/assets/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: ../electron/assets/icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0F0B2E"
  image: ../electron/assets/icon.png
  android_12:
    color: "#0F0B2E"
    image: ../electron/assets/icon.png

flutter:
  uses-material-design: true

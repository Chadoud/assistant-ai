name: Mobile

on:
  push:
    branches: [main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
      - ".fvm/fvm_config.json"
    tags:
      - "mobile-v*"
  pull_request:
    branches: [main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
      - ".fvm/fvm_config.json"
  workflow_dispatch:

jobs:
  release-gate:
    if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Legal URLs (store blocker)
        run: npm run verify:legal-urls
      - name: GO SYNC relay smoke
        continue-on-error: true
        run: npm run verify:go-sync

  quality-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Bootstrap platform projects
        run: bash mobile/setup.sh

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: flutter analyze
        working-directory: mobile
        run: flutter analyze --fatal-infos

      - name: flutter test
        working-directory: mobile
        run: flutter test

  build-android:
    needs: [release-gate, quality-mobile]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event_name == 'workflow_dispatch'
    env:
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - run: bash mobile/setup.sh

      - name: Configure Android signing
        if: env.ANDROID_KEYSTORE_B64 != ''
        working-directory: mobile/android
        run: |
          mkdir -p keystore
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore/exo-upload.jks
          cat > key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=keystore/exo-upload.jks
          EOF

      - name: Build Android App Bundle (production)
        working-directory: mobile
        run: |
          flutter pub get
          flutter build appbundle --release --dart-define-from-file=env/production.json

      - uses: actions/upload-artifact@v4
        with:
          name: exo-mobile-android-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    needs: [release-gate, quality-mobile]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/mobile-v') || github.event_name == 'workflow_dispatch'
    env:
      IOS_DIST_CERT_B64: ${{ secrets.IOS_DIST_CERT_B64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_PROVISION_PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_B64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true
      - run: bash mobile/setup.sh

      - name: Import signing certificate
        if: env.IOS_DIST_CERT_B64 != ''
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$IOS_DIST_CERT_B64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$IOS_PROVISION_PROFILE_B64" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Patch ExportOptions team ID
        if: env.APPLE_TEAM_ID != ''
        working-directory: mobile/ios
        run: |
          /usr/libexec/PlistBuddy -c "Add :teamID string ${APPLE_TEAM_ID}" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist

      - name: Build iOS IPA (signed when secrets present)
        working-directory: mobile
        run: |
          flutter pub get
          if [ -n "${IOS_DIST_CERT_B64}" ]; then
            flutter build ipa --release \
              --export-options-plist=ios/ExportOptions.plist \
              --dart-define-from-file=env/production.json
          else
            flutter build ios --release --no-codesign \
              --dart-define-from-file=env/production.json
          fi

      - name: Upload iOS IPA
        if: env.IOS_DIST_CERT_B64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: exo-mobile-ios-ipa
          path: mobile/build/ios/ipa/*.ipa

      - name: Upload iOS app (unsigned fallback)
        if: env.IOS_DIST_CERT_B64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: exo-mobile-ios
          path: mobile/build/ios/iphoneos/Runner.app

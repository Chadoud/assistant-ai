name: Store launch gate

# Runs on desktop v* tags — blocks release if legal URLs fail.
# Mobile store tags are gated on incubating/mobile (see docs/MOBILE.md).
on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Legal URLs (required for stores)
        run: npm run verify:legal-urls

      - name: GO SYNC relay smoke (advisory for desktop v*)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: npm run verify:go-sync

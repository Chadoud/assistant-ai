# Colocated credential broker — Infomaniak api.exosites.ch cannot reach this VPS.
# docker compose -f compose/docker-compose.minimal-staging.yml \
#   -f compose/docker-compose.infomaniak.yml \
#   -f compose/docker-compose.minimal-postgres.yml \
#   -f compose/docker-compose.tls-overlay.yml \
#   -f compose/docker-compose.sort-credentials-broker.yml \
#   --env-file .env up -d

services:
  sort-credentials-broker:
    build:
      context: ../sort-credentials-broker
    container_name: sort-credentials-broker
    environment:
      CLOUD_API_BASE_URL: ${CLOUD_API_BASE_URL:-https://api.exosites.ch}
      LITELLM_INTERNAL_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      SORT_LLM_PUBLIC_URL: https://${DOMAIN}
      SORT_LLM_TOKEN_TTL_SECONDS: ${SORT_LLM_TOKEN_TTL_SECONDS:-86400}
      SORT_LLM_MODELS: ${SORT_LLM_MODELS:-mistral,nomic-embed-text,moondream}
      SORT_LLM_MAX_PARALLEL: ${SORT_LLM_MAX_PARALLEL:-2}
      SORT_CLOUD_SORT_CONCURRENCY: ${SORT_CLOUD_SORT_CONCURRENCY:-1}
      SORT_SERVICE_MODE: ${SORT_SERVICE_MODE:-cloud}
      SORT_LLM_QUEUE_ENABLED: ${SORT_LLM_QUEUE_ENABLED:-0}
      SORT_LLM_QUEUE_IN_CREDENTIALS: ${SORT_LLM_QUEUE_IN_CREDENTIALS:-auto}
      SORT_QUEUE_ADMIT_THRESHOLD: ${SORT_QUEUE_ADMIT_THRESHOLD:-2}
      SORT_QUEUE_INTERNAL_URL: ${SORT_QUEUE_INTERNAL_URL:-http://sort-queue:4011}
    depends_on:
      litellm:
        condition: service_healthy
    expose:
      - "4010"
    restart: unless-stopped
    networks:
      - internal

name: Deploy Cloud API

on:
  workflow_dispatch:
    inputs:
      upload_env:
        description: Upload cloud-node/.env to server (UPLOAD_ENV=1)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      verify_after:
        description: Run verify-cloud-auth + GO SYNC smoke after deploy
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Write deploy env file
        working-directory: cloud-node
        run: |
          cat > .env.deploy <<EOF
          SSH_USER=${{ secrets.EXOSITES_DEPLOY_SSH_USER }}
          SSH_HOST=${{ secrets.EXOSITES_DEPLOY_SSH_HOST }}
          SSH_PASSWORD=${{ secrets.EXOSITES_DEPLOY_SSH_PASSWORD }}
          REMOTE_PATH=${{ secrets.EXOSITES_CLOUD_API_PATH }}
          EOF

      - name: Deploy cloud-node
        env:
          UPLOAD_ENV: ${{ github.event.inputs.upload_env }}
          VERIFY_AFTER_DEPLOY: ${{ github.event.inputs.verify_after }}
        run: bash scripts/deploy-cloud-api.sh

      - name: GO SYNC relay verify
        if: github.event.inputs.verify_after == 'true'
        run: npm run verify:go-sync

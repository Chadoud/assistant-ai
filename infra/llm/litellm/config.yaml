# Reviewable config — secrets via env (LITELLM_MASTER_KEY)
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://ollama-chat:11434
      timeout: 120
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama-embed:11434
      timeout: 60
  - model_name: moondream
    litellm_params:
      model: ollama/moondream
      api_base: http://ollama-chat:11434
      timeout: 180

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  allowed_fails: 3
  cooldown_time: 30

# Virtual keys created via LiteLLM admin API after deploy.
# Example RPM limits — tune per environment.
default_team_settings:
  max_parallel_requests: 4
  tpm_limit: 500000
  rpm_limit: 60

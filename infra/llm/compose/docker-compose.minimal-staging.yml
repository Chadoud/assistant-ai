# Minimal 19GB disk staging: one Ollama, LiteLLM, no Postgres/Caddy/Prometheus.
# docker compose -f compose/docker-compose.minimal-staging.yml --env-file .env up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-32}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - internal

  litellm:
    build:
      context: ../litellm
      dockerfile: Dockerfile
    image: exo-litellm:pillow
    container_name: litellm
    volumes:
      - ../litellm/config.minimal.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - internal

volumes:
  ollama_models:

networks:
  internal:
    driver: bridge
